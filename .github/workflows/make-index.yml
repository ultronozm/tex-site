name: make-index
on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch containing the generated snapshot"
        type: string
        default: "deploy"
  workflow_run:
    workflows: ["build"]
    types:
      - completed
permissions:
  contents: write
env:
  DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || 'deploy' }}
jobs:          
  make-index:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - snapshot
    steps:
      - name: Checkout pages
        uses: actions/checkout@v3
        with:
          ref: ${{ env.DEPLOY_BRANCH }}
          fetch-depth: 0
      - name: Debugging shell        
        working-directory: ${{ env.DIR }}
        run: |
          echo "Current directory is $(pwd)"
          echo "Listing files in the current directory:"
          ls -al
          echo "Git status:"
          git status
          echo "Git branch:"
          git branch
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}
      - name: Call Emacs to make index
        run: |
          emacs --batch -l ./tex2html.el --eval "(tex2html-make-index)"
      - name: Debugging shell        
        working-directory: ${{ env.DIR }}
        run: |
          echo "Current directory is $(pwd)"
          echo "Listing files in the current directory:"
          ls -al
      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # -f: listing.json is gitignored on main, plain add skips it silently
          git add -f listing.json || true
          git add -f index.html || true
          git commit -m "Updated listing.json and index.html" || echo "No changes to commit"
          git push -f
